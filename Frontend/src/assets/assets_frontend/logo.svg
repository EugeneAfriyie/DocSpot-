<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 120">
  <defs>
    <!-- Modern subtle gradient for the icon -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />  <!-- Tailwind sky-500 -->
      <stop offset="100%" stop-color="#0284c7" /> <!-- Tailwind sky-600 -->
    </linearGradient>
  </defs>

  <!-- Logo Icon: Rounded Medical Box -->
  <g transform="translate(15, 20)">
    <rect width="80" height="80" rx="24" fill="url(#iconGrad)" />
    <!-- White Medical Cross -->
    <path d="M30 20 h20 v15 h15 v10 h-15 v15 h-20 v-15 h-15 v-10 h15 z" fill="#ffffff" transform="translate(0, 5)" />
  </g>

  <!-- Logo Text: MediApo -->
  <!-- Using system-ui fonts so it looks perfectly native and crisp on Windows, Mac, and Mobile -->
  <text x="110" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#0f172a">Medi</tspan><tspan fill="#0284c7">Apo</tspan>
  </text>

  <!-- Green 'Online/Health' Indicator Dot -->
  <circle cx="410" cy="74" r="8" fill="#10b981" /> <!-- Tailwind emerald-500 -->
</svg>
